name: nm-dut

services:
  dut:
    build: ./dut
    container_name: nm-dut
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      nm-client:
        ipv4_address: 172.20.1.10
      nm-server:
        ipv4_address: 172.20.2.10

networks:
  nm-client:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: nm-client-br  # WSL2에서 직접 생성한 브릿지 이름 지정
    ipam:
      config:
        - subnet: 172.20.1.0/24
          gateway: 172.20.1.1
  nm-server:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: nm-server-br  # WSL2에서 직접 생성한 브릿지 이름 지정
    ipam:
      config:
        - subnet: 172.20.2.0/24
          gateway: 172.20.2.1
